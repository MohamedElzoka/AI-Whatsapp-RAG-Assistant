# Nginx reverse proxy with TLS termination.
#
# Routes:
#   /webhook, /documents, /conversations, /analytics, /health, /docs, /openapi.json
#     -> FastAPI backend (rag_backend:8000)
#   everything else (including Streamlit's websocket paths)
#     -> Streamlit dashboard (rag_dashboard:8501)
#
# For local/dev use, generate a self-signed certificate first:
#   openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
#     -keyout nginx/certs/selfsigned.key \
#     -out nginx/certs/selfsigned.crt \
#     -subj "/CN=localhost"
#
# For production, replace certs/selfsigned.* with a real certificate
# (e.g. via Let's Encrypt / certbot) and update the paths below.

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    sendfile on;
    client_max_body_size 30M;

    upstream backend_upstream {
        server backend:8000;
    }

    upstream dashboard_upstream {
        server dashboard:8501;
    }

    # Redirect all plain HTTP to HTTPS
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/certs/selfsigned.crt;
        ssl_certificate_key /etc/nginx/certs/selfsigned.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # ---- FastAPI backend routes ----
        location ~ ^/(webhook|documents|conversations|analytics|health|docs|openapi\.json|redoc|test-chat) {
            proxy_pass http://backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ---- Streamlit dashboard (default) ----
        location / {
            proxy_pass http://dashboard_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
        }
    }
}
