version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: rag_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rag_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rag_password}
      POSTGRES_DB: ${POSTGRES_DB:-rag_assistant}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rag_user} -d ${POSTGRES_DB:-rag_assistant}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rag_network
    # Uncomment to access Postgres from the host for debugging:
    # ports:
    #   - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: rag_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rag_network

  qdrant:
    image: qdrant/qdrant:v1.11.3
    container_name: rag_qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - rag_network
    # Uncomment to access the Qdrant dashboard from the host:
    # ports:
    #   - "6333:6333"

  backend:
    build: ./backend
    container_name: rag_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-rag_user}:${POSTGRES_PASSWORD:-rag_password}@postgres:5432/${POSTGRES_DB:-rag_assistant}
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      UPLOAD_DIR: /app/uploads
      LOG_DIR: /app/logs
    volumes:
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    networks:
      - rag_network
    # Exposed only to nginx; uncomment for direct host access during development:
    # ports:
    #   - "8000:8000"

  dashboard:
    build: ./dashboard
    container_name: rag_dashboard
    restart: unless-stopped
    environment:
      BACKEND_URL: http://backend:8000
      ADMIN_API_KEY: ${ADMIN_API_KEY}
    depends_on:
      - backend
    networks:
      - rag_network
    # ports:
    #   - "8501:8501"

  nginx:
    image: nginx:1.27-alpine
    container_name: rag_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - dashboard
    networks:
      - rag_network

networks:
  rag_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  backend_uploads:
  backend_logs:
